<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для любименькой машульки ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
}

section {
  padding: 60px 20px;
  max-width: 700px;
  margin: auto;
}

h1, h2 {
  margin-bottom: 20px;
}

p {
  font-size: 18px;
  line-height: 1.6;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 10px;
}

.yes { background: #4CAF50; color: white; }
.no  { background: #f44336; color: white; position: absolute; }

</style>
</head>

<body>

<!-- 1. Привет -->
<section>
  <h1>Здравствуйте уважаемая Мария 💔</h1>
  <p id="typing"></p>
</section>

<!-- 2. Таймер -->
<section>
  <h2 id="timer"></h2>
</section>

<!-- 3. Признание -->
<section>
  <h2>Я был неправ</h2>
  <p id="line1"></p>
  <p id="line2"></p>
  <p id="line3"></p>
</section>

<!-- 4. Финал -->
<section>
  <h2>Дашь мне шанс всё исправить? ❤️</h2>
  <button class="yes" onclick="yes()">Да ❤️</button>
  <button class="no" id="noBtn">Нет</button>
</section>

<script>
// печатающийся текст (вступление)
let intro = "Я очень очень долго думал и старался.";
let i = 0;

function typeIntro() {
  if (i < intro.length) {
    document.getElementById("typing").innerHTML += intro.charAt(i);
    i++;
    setTimeout(typeIntro, 40);
  }
}
typeIntro();

// таймер
let start = new Date("2024-08-26");
setInterval(() => {
  let now = new Date();
  let diff = Math.floor((now - start) / 1000);
  document.getElementById("timer").innerText =
    "Я думаю о тебе уже " + diff + " секунд ❤️";
}, 1000);

// постепенное появление признания
let lines = [
  "Я очень очень сильно нафаршмачил недавно",
  "Я понимаю насколько сильно оно было неприятно и дискомфортно",
  "Бегемотя таких ситуаций больше не хочет допускать и не будет"
];

lines.forEach((text, index) => {
  setTimeout(() => {
    document.getElementById("line" + (index+1)).innerText = text;
  }, 3000 + index * 2000);
});

// убегающая кнопка
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
  noBtn.style.top = Math.random() * window.innerHeight + "px";
  noBtn.style.left = Math.random() * window.innerWidth + "px";
});

// финал
function yes() {
  document.body.innerHTML =
    "<h1 style='margin-top:20%'>Спасибочки🥰 </h1>";
}
</script>

</body>
</html>
